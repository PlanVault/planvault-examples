# Use this workflow when planvault-examples is the Git repository root.
# In the PlanVault monorepo, copy or invoke these jobs from a workflow under /.github/workflows/ if you want CI here.
name: planvault-examples

on:
  push:
  pull_request:

defaults:
  run:
    working-directory: .

jobs:
  react-chat:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/react-chat/package-lock.json
      - run: npm ci && npm test && npm run build
        working-directory: frontend/react-chat

  scala-worker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: sbt
      - run: sbt test
        working-directory: webhooks/kafka-trigger/scala-fs2

  java-worker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
      - run: mvn -B -q verify
        working-directory: webhooks/kafka-trigger/java-spring

  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pytest
      - uses: astral-sh/setup-ruff@v3
      - run: ruff check webhooks/kafka-trigger/python-confluent mcp/python-sqlite webhooks/kafka-trigger/python-confluent/tests mcp/python-sqlite/tests
      - run: pytest

  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update && sudo apt-get install -y shellcheck
      - run: shellcheck scripts/bash-e2e/script.sh
