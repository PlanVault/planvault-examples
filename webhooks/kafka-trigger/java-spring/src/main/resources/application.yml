spring:
  application:
    name: planvault-kafka-trigger
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:127.0.0.1:19092}
    consumer:
      group-id: ${PLANVAULT_KAFKA_GROUP_ID:planvault-example-java}
      enable-auto-commit: false
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

planvault:
  base-url: "${PLANVAULT_BASE_URL:https://api.planvault.ai}"
  org-id: ${PLANVAULT_ORG_ID:00000000-0000-0000-0000-000000000000}
  trigger-key: ${PLANVAULT_TRIGGER_KEY:unset}
  webhook-secret: ${PLANVAULT_WEBHOOK_SECRET:}
