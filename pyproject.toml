[tool.ruff]
line-length = 108
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "W"]

[tool.pytest.ini_options]
pythonpath = [
  "mcp/python-sqlite",
  "webhooks/kafka-trigger/python-confluent",
]
